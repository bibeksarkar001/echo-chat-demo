<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO - Secure P2P Communications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { cyber: { base: '#030303', surface: '#0A0A0A', border: '#1A1A1A', cyan: '#00E5FF', violet: '#B000FF', emerald: '#00E676' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030303; color: white; overflow: hidden; }
        .glass { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(12px); border-right: 1px solid #1A1A1A; }
    </style>
</head>
<body class="flex h-screen w-full antialiased">

    <aside class="w-80 h-full glass flex flex-col z-10 hidden md:flex">
        <div class="p-6 border-b border-cyber-border">
            <h1 class="text-2xl font-bold font-mono tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyber-cyan to-cyber-violet">ECHO</h1>
        </div>
        
        <div class="p-4 border-b border-cyber-border space-y-4">
            <div>
                <label class="text-xs text-gray-500 font-mono">YOUR SECURE ID:</label>
                <div class="flex items-center gap-2 mt-1">
                    <input type="text" id="my-id" readonly class="w-full bg-cyber-surface border border-cyber-border rounded px-2 py-1 text-cyber-cyan font-mono text-sm" value="Generating...">
                    <button onclick="copyMyId()" class="p-1.5 bg-cyber-surface border border-cyber-border rounded hover:text-cyber-cyan"><i data-lucide="copy" class="w-4 h-4"></i></button>
                </div>
            </div>
            
            <div>
                <label class="text-xs text-gray-500 font-mono">CONNECT TO PARTNER:</label>
                <div class="flex items-center gap-2 mt-1">
                    <input type="text" id="partner-id" placeholder="Paste partner ID..." class="w-full bg-cyber-base border border-cyber-border rounded px-2 py-1 text-white font-mono text-sm focus:border-cyber-violet outline-none">
                    <button onclick="connectToPartner()" class="p-1.5 bg-cyber-violet/20 border border-cyber-violet/50 text-cyber-violet rounded hover:bg-cyber-violet hover:text-white"><i data-lucide="link" class="w-4 h-4"></i></button>
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-cyber-border text-xs text-gray-600 font-mono text-center mt-auto">
            <span id="conn-status" class="text-yellow-500 animate-pulse">WAITING FOR CONNECTION...</span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-cyber-base">
        <header class="h-20 border-b border-cyber-border flex items-center justify-between px-6 bg-black/40 z-10">
            <div>
                <h2 class="text-lg font-bold">Secure P2P Channel</h2>
                <p class="text-xs text-gray-500 flex items-center gap-2 font-mono mt-1">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-500"></span> 
                    <span id="header-status">Disconnected</span>
                </p>
            </div>
            <button onclick="startVideoCall()" id="video-btn" disabled class="p-2 rounded-lg bg-cyber-surface border border-cyber-border text-gray-600 transition-all flex items-center gap-2 disabled:opacity-50">
                <i data-lucide="video" class="w-5 h-5"></i> <span class="text-sm font-semibold hidden sm:block">Initialize WebRTC</span>
            </button>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4"></div>

        <div class="p-6 border-t border-cyber-border bg-black/40">
            <form id="message-form" class="flex items-center gap-4">
                <input type="text" id="message-input" disabled autocomplete="off" placeholder="Connect to a partner first..." class="flex-1 bg-cyber-surface border border-cyber-border rounded-xl p-3 text-sm text-gray-200 font-mono outline-none focus:border-cyber-cyan disabled:opacity-50">
                <button type="submit" id="send-btn" disabled class="p-3 rounded-xl bg-cyber-cyan/10 border border-cyber-cyan/30 text-cyber-cyan disabled:opacity-50 disabled:text-gray-500">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </main>

    <div id="video-modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-50 hidden flex-col items-center justify-center">
        <div class="w-full max-w-5xl p-4 relative">
            <div class="absolute top-4 left-4 font-mono text-cyber-cyan text-sm animate-pulse z-10">E2EE MEDIA STREAM // ACTIVE</div>
            <button onclick="endVideoCall()" class="absolute top-4 right-4 p-2 text-red-500 bg-red-500/10 rounded-lg hover:bg-red-500 hover:text-white transition-all z-10">
                <i data-lucide="phone-off" class="w-6 h-6"></i>
            </button>
            
            <div class="relative w-full aspect-video bg-cyber-surface border border-cyber-border rounded-2xl overflow-hidden shadow-[0_0_50px_rgba(0,229,255,0.1)] flex">
                <video id="remote-video" autoplay playsinline class="w-full h-full object-cover"></video>
                <video id="local-video" autoplay muted playsinline class="absolute bottom-4 right-4 w-48 aspect-video bg-black border-2 border-cyber-border rounded-xl object-cover shadow-2xl"></video>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // System Elements
        const myIdDisplay = document.getElementById('my-id');
        const partnerIdInput = document.getElementById('partner-id');
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const videoBtn = document.getElementById('video-btn');
        const statusDot = document.getElementById('status-dot');
        const headerStatus = document.getElementById('header-status');
        const connStatus = document.getElementById('conn-status');

        // WebRTC Variables
        let peer = null;
        let dataConnection = null;
        let localStream = null;
        let currentCall = null;

        // 1. Initialize PeerJS (Connects to free public signaling server)
        peer = new Peer({ debug: 2 });

        peer.on('open', (id) => {
            myIdDisplay.value = id;
            appendSystemMessage("Connected to signaling server. Ready for P2P handshake.");
        });

        // 2. Listen for Incoming Connections (Someone pasting your ID)
        peer.on('connection', (conn) => {
            handleConnection(conn);
        });

        // 3. Initiate Connection (You pasting someone's ID)
        function connectToPartner() {
            const partnerId = partnerIdInput.value.trim();
            if (!partnerId) return alert("Enter a partner ID");
            
            appendSystemMessage(`Attempting to connect to ${partnerId}...`);
            const conn = peer.connect(partnerId);
            handleConnection(conn);
        }

        // Handle the active data channel
        function handleConnection(conn) {
            dataConnection = conn;

            dataConnection.on('open', () => {
                // UI Updates
                statusDot.classList.replace('bg-gray-500', 'bg-cyber-emerald');
                statusDot.classList.add('animate-pulse');
                headerStatus.innerText = "E2EE Secured";
                headerStatus.classList.add('text-cyber-emerald');
                connStatus.innerText = "SYS.STATUS: P2P ACTIVE";
                connStatus.classList.replace('text-yellow-500', 'text-cyber-emerald');
                messageInput.disabled = false;
                sendBtn.disabled = false;
                videoBtn.disabled = false;
                videoBtn.classList.add('hover:border-cyber-cyan', 'hover:text-cyber-cyan');
                messageInput.placeholder = "Transmit secure payload...";
                
                appendSystemMessage("P2P Handshake successful. Secure channel open.");
            });

            // Receive Messages
            dataConnection.on('data', (data) => {
                appendMessage(data, false);
            });

            dataConnection.on('close', () => {
                appendSystemMessage("Connection lost.");
                resetUI();
            });
        }

        // Send Message
        document.getElementById('message-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !dataConnection) return;

            dataConnection.send(text);
            appendMessage(text, true);
            messageInput.value = '';
        });

        // --- VIDEO CALL LOGIC ---

        // Listen for incoming calls
        peer.on('call', async (call) => {
            const accept = confirm("Incoming encrypted video transmission. Accept?");
            if (accept) {
                await setupLocalVideo();
                call.answer(localStream); // Answer with our stream
                handleCall(call);
            }
        });

        // Initiate a call
        async function startVideoCall() {
            if (!dataConnection) return alert("Establish text connection first.");
            await setupLocalVideo();
            const call = peer.call(dataConnection.peer, localStream);
            handleCall(call);
        }

        function handleCall(call) {
            currentCall = call;
            document.getElementById('video-modal').classList.replace('hidden', 'flex');
            
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });

            call.on('close', () => {
                endVideoCall();
            });
        }

        async function setupLocalVideo() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
            } catch (err) {
                alert("Camera/Microphone access required.");
            }
        }

        function endVideoCall() {
            if (currentCall) currentCall.close();
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            document.getElementById('video-modal').classList.replace('flex', 'hidden');
            document.getElementById('remote-video').srcObject = null;
            document.getElementById('local-video').srcObject = null;
        }

        // --- UTILS ---
        function appendMessage(text, isMe) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col max-w-[80%] ${isMe ? 'self-end items-end' : 'self-start items-start'}`;
            msgDiv.innerHTML = `
                <div class="px-4 py-2 rounded-xl ${isMe ? 'bg-cyber-violet/20 border border-cyber-violet/30 text-white' : 'bg-cyber-surface border border-cyber-border text-gray-200'} shadow-lg">
                    <p class="text-sm">${text}</p>
                </div>
                <span class="text-[10px] text-gray-500 mt-1 font-mono">${time}</span>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = "text-center text-xs text-cyber-cyan my-2 font-mono tracking-widest uppercase opacity-70";
            msgDiv.innerText = `// ${text} //`;
            chatBox.appendChild(msgDiv);
        }

        function copyMyId() {
            navigator.clipboard.writeText(myIdDisplay.value);
            alert("Secure ID Copied to Clipboard");
        }

        function resetUI() {
            statusDot.classList.replace('bg-cyber-emerald', 'bg-gray-500');
            headerStatus.innerText = "Disconnected";
            headerStatus.classList.remove('text-cyber-emerald');
            messageInput.disabled = true;
            sendBtn.disabled = true;
            videoBtn.disabled = true;
        }
    </script>
</body>
</html>
